name: ${COMPOSE_PROJECT_NAME:-110devspace}

services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16}
    restart: unless-stopped
    environment:
      TZ: ${PLATFORM_TIMEZONE:-Asia/Shanghai}
      POSTGRES_DB: ${POSTGRES_DB:-gitea}
      POSTGRES_USER: ${POSTGRES_USER:-gitea}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gitea} -d ${POSTGRES_DB:-gitea}"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - ${DATA_ROOT:-/srv/110devspace}/postgres:/var/lib/postgresql/data
      - /etc/localtime:/etc/localtime:ro
    networks:
      - platform

  gitea:
    image: ${GITEA_IMAGE:-docker.gitea.com/gitea:1.25.4-rootless}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      TZ: ${PLATFORM_TIMEZONE:-Asia/Shanghai}
      USER_UID: ${APP_UID:-1000}
      USER_GID: ${APP_GID:-1000}
      GITEA__database__DB_TYPE: postgres
      GITEA__database__HOST: postgres:5432
      GITEA__database__NAME: ${POSTGRES_DB:-gitea}
      GITEA__database__USER: ${POSTGRES_USER:-gitea}
      GITEA__database__PASSWD: ${POSTGRES_PASSWORD}
      GITEA__database__SSL_MODE: disable
      GITEA__server__DOMAIN: ${GITEA_HOST:-git.110devspace.internal}
      GITEA__server__ROOT_URL: https://${GITEA_HOST:-git.110devspace.internal}/
      GITEA__server__HTTP_PORT: 3000
      GITEA__server__SSH_DOMAIN: ${GITEA_HOST:-git.110devspace.internal}
      GITEA__server__SSH_PORT: ${GITEA_SSH_PORT:-2222}
      GITEA__server__SSH_LISTEN_PORT: ${GITEA_INTERNAL_SSH_PORT:-2222}
      GITEA__server__START_SSH_SERVER: "true"
      GITEA__security__INSTALL_LOCK: "true"
      GITEA__service__DISABLE_REGISTRATION: "true"
      GITEA__service__REQUIRE_SIGNIN_VIEW: "true"
      GITEA__service__REGISTER_EMAIL_CONFIRM: "false"
      GITEA__service__ENABLE_NOTIFY_MAIL: "false"
      GITEA__picture__DISABLE_GRAVATAR: "true"
      GITEA__mailer__ENABLED: "false"
      GITEA__session__COOKIE_SECURE: "true"
      GITEA__log__MODE: console
    ports:
      - "${GITEA_SSH_PORT:-2222}:${GITEA_INTERNAL_SSH_PORT:-2222}"
    volumes:
      - ${DATA_ROOT:-/srv/110devspace}/gitea:/var/lib/gitea
      - /etc/localtime:/etc/localtime:ro
    networks:
      - platform

  code-server-zhoucanyu:
    image: ${CODE_SERVER_IMAGE:-ghcr.io/coder/code-server:4.107.1-39}
    restart: unless-stopped
    user: "${APP_UID:-1000}:${APP_GID:-1000}"
    working_dir: /home/coder/workspace
    environment:
      TZ: ${PLATFORM_TIMEZONE:-Asia/Shanghai}
      USER: coder
    entrypoint:
      - /bin/sh
      - -lc
      - |-
        CONFIG_DIR="/home/coder/.config/code-server"
        CONFIG_FILE="$$CONFIG_DIR/config.yaml"
        mkdir -p "$$CONFIG_DIR"
        if [ ! -f "$$CONFIG_FILE" ]; then
          cat > "$$CONFIG_FILE" <<EOF
        bind-addr: 0.0.0.0:8080
        auth: password
        password: ${CODE_SERVER_INITIAL_PASSWORD}
        cert: false
        EOF
        fi
        exec code-server --config "$$CONFIG_FILE" /home/coder/workspace
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cpus: "1.0"
    mem_limit: "1536m"
    mem_reservation: "512m"
    pids_limit: 256
    volumes:
      - ${DATA_ROOT:-/srv/110devspace}/workspaces/zhoucanyu:/home/coder/workspace
      - ${DATA_ROOT:-/srv/110devspace}/code-server/zhoucanyu/config:/home/coder/.config/code-server
      - ${DATA_ROOT:-/srv/110devspace}/code-server/zhoucanyu/local:/home/coder/.local/share/code-server
      - /etc/localtime:/etc/localtime:ro
    networks:
      - platform

